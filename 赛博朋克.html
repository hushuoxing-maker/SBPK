<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古月·赛博朋克商业门头智能生成系统 V3.0 专业版</title>

    <style>
        :root {
            --primary: #6C00FF;
            --accent: #00F5FF;
            --bg: #0A0B14;
            --card-bg: rgba(255, 255, 255, 0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
        
        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(108, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 245, 255, 0.1) 0%, transparent 50%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .header {
            text-align: center;
            padding: 50px 20px;
            border-radius: 20px;
            background: linear-gradient(90deg, #1A1F35, #0F1020);
            border: 1px solid rgba(0, 245, 255, 0.3);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .header h1 {
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--accent), 0 0 20px var(--primary);
            animation: blink 3s infinite;
        }

        @keyframes blink {
            0%, 95%, 100% { opacity: 1; }
            96% { opacity: 0.7; }
            98% { opacity: 0.9; }
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .panel {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
        }

        label { display: block; margin: 15px 0 8px; font-size: 14px; color: var(--accent); font-weight: bold; }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 245, 255, 0.2); }

        button.main-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(108, 0, 255, 0.4);
            transition: 0.3s;
        }

        button.main-btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 8px 25px rgba(0, 245, 255, 0.5); }
        button.main-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .result-item {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .prompt-zh { font-size: 16px; color: #E5E7EB; line-height: 1.6; }

        .copy-btn {
            margin-top: 10px;
            padding: 8px 15px;
            background: var(--primary);
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-btn:hover { background: var(--accent); }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid var(--accent);
            border-radius: 4px;
            font-size: 10px;
            margin-right: 5px;
            color: var(--accent);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--accent);
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>

<div class="header">
    <h1>🔮 古月 · 赛博朋克门头智能生成系统 V3.0</h1>
    <p>AI辅助设计 | 高级工程材质 | 全中文提示词</p>
</div>

<div class="container">
    <div class="panel">
        <label>店铺行业类别 <span style="color:#999; font-weight:normal">(必填)</span></label>
        <input type="text" id="industry" placeholder="例如：电竞胶囊、沉浸式清吧、私人影院" required>

        <label>光效氛围</label>
        <select id="scene">
            <option value="夜景，浓郁电影感，体积雾">夜景·浓郁电影感·体积雾</option>
            <option value="雨夜，湿滑地面霓虹反射">雨夜·湿滑地面霓虹反射</option>
            <option value="白昼，高精尖纯净白光">白昼·高精尖纯净白光</option>
            <option value="黄昏，青橙色调电影级调色">黄昏·青橙色调电影级调色</option>
        </select>

        <button class="main-btn" style="margin-top: 40px;" onclick="generate()">⚡ 立即生成专业提示词</button>
    </div>

    <div id="result-container"></div>
</div>

<script>
const r = arr => arr[Math.floor(Math.random() * arr.length)];

// 纯中文词库
const styles = [
    "硬核工业赛博",
    "极简科技未来",
    "复古霓虹街区",
    "超高密度细节",
    "故障艺术风"
];

const materials = [
    "拉丝阳极氧化铝板",
    "半透明磨砂亚克力",
    "碳纤维纹理面",
    "蜂窝状LED发光板",
    "防腐蚀强化玻璃"
];

const details = [
    "8K 渲染，光线追踪，虚幻引擎5风格",
    "超写实主义，RAW 照片质感",
    "景深效果，电影镜头感"
];

async function generate() {
    // 验证必填项
    const industryInput = document.getElementById("industry");
    const industry = industryInput.value.trim();
    if (!industry) {
        alert("请输入店铺行业类别！");
        industryInput.focus();
        return;
    }

    const scene = document.getElementById("scene").value;
    const container = document.getElementById("result-container");
    const btn = document.querySelector(".main-btn");

    // 加载状态
    btn.disabled = true;
    container.innerHTML = `<div class="loading">正在生成赛博朋克提示词...</div>`;
    await new Promise(res => setTimeout(res, 600));

    // 生成20组提示词
    container.innerHTML = `<h2 style="margin:20px 0; color:var(--accent)">生成结果 (共20组)</h2>`;
    for (let i = 0; i < 20; i++) {
        const s = r(styles);
        const m = r(materials);
        const d = r(details);

        // 纯中文提示词
        const prompt = `【${industry}】门头设计，${s}风格，使用${m}材质，${scene}，${d}，赛博朋克风格，商业门头专业设计，高细节，高质感。`;

        // 创建结果项
        const item = document.createElement("div");
        item.className = "result-item";
        item.innerHTML = `
            <div><span class="tag">方案 ${i + 1}</span></div>
            <div class="prompt-zh" id="p-${i}">${prompt}</div>
            <button class="copy-btn" onclick="copyText('p-${i}', this)">复制提示词</button>
        `;
        container.appendChild(item);
    }

    btn.disabled = false;
}

// 复制功能
function copyText(id, btn) {
    try {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => {
            btn.textContent = "✅ 已复制";
            btn.style.background = "#00F5FF";
            setTimeout(() => {
                btn.textContent = "复制提示词";
                btn.style.background = "#6C00FF";
            }, 1500);
        });
    } catch (err) {
        alert("复制失败，请手动复制！");
        console.error("复制错误：", err);
    }
}
</script>

</body>
</html>
