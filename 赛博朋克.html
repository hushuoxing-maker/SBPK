<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古月·赛博视觉生成系统 V3.1</title>
    <style>
        :root {
            --primary: #7000FF;
            --accent: #00F5FF;
            --deep-black: #050508;
            --card-bg: rgba(20, 20, 35, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", "PingFang SC", sans-serif; }
        
        body {
            background: var(--deep-black);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e 0%, transparent 70%);
            min-height: 100vh;
            padding: 20px;
            color: #eee;
        }

        .header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            letter-spacing: 3px;
            background: linear-gradient(90deg, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .main-ui {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .input-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 12px; 
            color: var(--accent); 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            color: #fff;
            border-radius: 4px;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--accent); outline: none; background: rgba(0,0,0,0.7); }

        .gen-btn {
            width: 100%;
            padding: 16px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: 0.4s;
            margin-top: 10px;
        }

        .gen-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
        }

        .result-area { margin-top: 30px; }

        .prompt-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid #222;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
            border-left: 2px solid var(--primary);
        }

        .p-zh { color: #888; font-size: 13px; margin-bottom: 10px; }
        .p-en { color: #fff; font-size: 14px; line-height: 1.5; font-family: 'Courier New', monospace; }

        .copy-tag {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 10px;
            color: var(--accent);
            cursor: pointer;
            border: 1px solid var(--accent);
            padding: 2px 6px;
            border-radius: 3px;
        }
        
        .copy-tag:hover { background: var(--accent); color: #000; }

        /* 隐藏滚动条但保留功能 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); }
    </style>
</head>
<body>

<div class="header">
    <h1>CYBER-VISUAL SYSTEM V3.1</h1>
</div>

<div class="main-ui">
    <div class="input-group">
        <label>行业领域 Industry</label>
        <input type="text" id="industry" placeholder="例：潮玩概念店 / 威士忌酒吧 / 电子竞技">
    </div>

    <div class="input-group">
        <label>环境模式 Environment Mode</label>
        <select id="scene">
            <option value="Midnight pure black, high contrast, neon glow, pitch black background">极黑之夜 (高对比纯黑背景)</option>
            <option value="Cyber-night, cinematic neon lighting, atmospheric fog">霓虹夜景 (电影氛围渲染)</option>
            <option value="Rainy cyber street, wet floor reflection, neon lights">雨夜模式 (地面湿润反射)</option>
            <option value="Future daylight, high-tech white style, clean lighting">白昼未来 (纯净高科技感)</option>
        </select>
    </div>

    <div class="input-group" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
        <div>
            <label>比例 Ratio</label>
            <select id="ratio">
                <option value="--ar 16:9">16:9 宽屏</option>
                <option value="--ar 3:4">3:4 竖屏</option>
                <option value="--ar 1:1">1:1 方图</option>
            </select>
        </div>
        <div>
            <label>模型 Model</label>
            <select id="version">
                <option value="--v 6.0">Midjourney V6</option>
                <option value="--niji 6">Niji 6 (动漫)</option>
            </select>
        </div>
    </div>

    <button class="gen-btn" onclick="generate()">GENERATE 20 PROMPTS</button>

    <div class="result-area" id="results"></div>
</div>

<script>
const r = (arr) => arr[Math.floor(Math.random() * arr.length)];

// 精选风格与材质库
const styles = ["Cyber-minimalism", "High-tech industrial", "Avant-garde architecture", "Digital-glitch aesthetic", "Hyper-futuristic"];
const colors = ["Cyan and Magenta gradient", "Electric Purple neon", "Acid Green laser", "Deep Sea Blue", "Crimson and Gold"];
const materials = ["Translucent frosted glass", "Brushed metal facade", "Anodized aluminum", "Glowing acrylic letters", "Mirror finish steel"];

function generate() {
    const ind = document.getElementById("industry").value || "Storefront";
    const sce = document.getElementById("scene").value;
    const rat = document.getElementById("ratio").value;
    const ver = document.getElementById("version").value;
    const res = document.getElementById("results");

    res.innerHTML = "";

    for(let i=0; i<20; i++){
        const sty = r(styles);
        const col = r(colors);
        const mat = r(materials);
        
        const zh = `[方案 ${i+1}] ${ind}门头，${sty}风格，${col}灯光，材质采用${mat}，配合${sce.split(',')[0]}效果。`;
        const en = `Professional storefront design for ${ind}, ${sty}, ${col} neon lighting, made of ${mat}, ${sce}, architectural photography, 8k resolution, photorealistic, sharp details ${ver} ${rat}`;

        const div = document.createElement("div");
        div.className = "prompt-card";
        div.innerHTML = `
            <div class="copy-tag" onclick="copyIt(this, '${i}')">COPY</div>
            <p class="p-zh">${zh}</p>
            <p class="p-en" id="en-${i}">${en}</p>
        `;
        res.appendChild(div);
    }
}

function copyIt(btn, id) {
    const text = document.getElementById(`en-${id}`).innerText;
    navigator.clipboard.writeText(text);
    btn.innerText = "COPIED!";
    setTimeout(() => btn.innerText = "COPY", 1000);
}
</script>

</body>
</html>
