<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古月·赛博门头灵感库 V4.0</title>
    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00f5ff;
            --bg-dark: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        
        body {
            background: var(--bg-dark);
            color: #fff;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .main-card {
            width: 100%;
            max-width: 600px;
            background: #111;
            border: 1px solid #222;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0,0,0,1);
        }

        .header-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 22px;
            letter-spacing: 4px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #888;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 15px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            font-size: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            outline: none;
        }

        input:focus { border-color: var(--neon-pink); }

        .gen-btn {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1.5px solid var(--neon-pink);
            color: var(--neon-pink);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 6px;
        }

        .gen-btn:hover {
            background: var(--neon-pink);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
        }

        .result-list { margin-top: 30px; }

        .item {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 12px;
            line-height: 1.6;
            font-size: 14px;
            border-left: 3px solid var(--neon-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-link {
            color: var(--neon-blue);
            cursor: pointer;
            font-size: 12px;
            margin-left: 15px;
            white-space: nowrap;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="main-card">
    <div class="header-title">古月 · 赛博门头系统</div>
    
    <label>输入店铺行业</label>
    <input type="text" id="industry" placeholder="例如：电竞馆、黑胶吧、潮鞋店">

    <button class="gen-btn" onclick="generate()">生成 20 组纯中文提示词</button>

    <div class="result-list" id="output"></div>
</div>

<script>
const r = (arr) => arr[Math.floor(Math.random() * arr.length)];

// 纯中文词库
const styles = ["硬核工业风", "极简未来主义", "参数化流线设计", "重金属废土感", "霓虹复古美学", "数字黑客风格", "超现实科幻感"];
const lights = ["蓝紫渐变霓虹", "电光紫发光带", "青色激光线条", "极黑背景对比光", "阵列式呼吸灯", "隐藏式线性光源"];
const materials = ["阳极氧化铝板", "磨砂半透明亚克力", "不锈钢镜面", "蜂窝状金属网", "碳纤维肌理", "液态金属质感"];
const scenes = ["黑夜纯黑背景", "雨后地面反射", "迷雾电影氛围", "高对比度强阴影", "丁达尔效应"];

function generate() {
    const ind = document.getElementById("industry").value || "商业门头";
    const out = document.getElementById("output");
    out.innerHTML = "";

    for(let i=0; i<20; i++){
        const txt = `[${ind}]门头设计，${r(styles)}，${r(materials)}，${r(lights)}，${r(scenes)}，8K超高清，写实建筑摄影效果 ——古月视觉`;
        
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
            <span>${i+1}. ${txt}</span>
            <span class="copy-link" onclick="copyText('${txt}', this)">复制</span>
        `;
        out.appendChild(div);
    }
}

function copyText(text, el) {
    navigator.clipboard.writeText(text);
    el.innerText = "已复制";
    setTimeout(() => el.innerText = "复制", 1000);
}
</script>

</body>
</html>
