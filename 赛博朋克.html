<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>古月·赛博朋克商业门头智能系统 V3.0 专业版</title>

    <style>
        :root {
            --primary: #6C00FF;
            --accent: #00F5FF;
            --bg: #0A0B14;
            --card-bg: rgba(255, 255, 255, 0.07);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
        
        body {
            background: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(108, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 245, 255, 0.1) 0%, transparent 50%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .header {
            text-align: center;
            padding: 50px 20px;
            border-radius: 20px;
            background: linear-gradient(90deg, #1A1F35, #0F1020);
            border: 1px solid rgba(0, 245, 255, 0.3);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .header h1 {
            font-size: 28px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--accent), 0 0 20px var(--primary);
            animation: blink 3s infinite;
        }

        @keyframes blink {
            0%, 95%, 100% { opacity: 1; }
            96% { opacity: 0.7; }
            98% { opacity: 0.9; }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }

        .panel {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        label { display: block; margin: 15px 0 8px; font-size: 14px; color: var(--accent); font-weight: bold; }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 245, 255, 0.2); }

        .btn-group { grid-column: 1 / -1; }

        button.main-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(108, 0, 255, 0.4);
            transition: 0.3s;
        }

        button.main-btn:hover { transform: translateY(-2px); filter: brightness(1.1); box-shadow: 0 8px 25px rgba(0, 245, 255, 0.5); }
        button.main-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .result-item {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .prompt-zh { font-size: 14px; color: #E5E7EB; margin-bottom: 8px; }
        .prompt-en { font-size: 12px; color: #9CA3AF; font-style: italic; line-height: 1.4; }

        .copy-btn {
            margin-top: 10px;
            padding: 6px 15px;
            background: var(--primary);
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .copy-btn:hover { background: var(--accent); }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid var(--accent);
            border-radius: 4px;
            font-size: 10px;
            margin-right: 5px;
            color: var(--accent);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--accent);
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>

<body>

<div class="header">
    <h1>🔮 古月 · 赛博朋克门头智能生成系统 V3.0</h1>
    <p>AI辅助设计 | 高级工程材质 | 跨平台 Prompt 兼容</p>
</div>

<div class="container">
    <div class="panel">
        <label>店铺行业类别</label>
        <input type="text" id="industry" placeholder="例如：电竞胶囊、沉浸式清吧、私人影院">

        <label>光效氛围</label>
        <select id="scene">
            <option value="Night scene, intense cinematic lighting, volumetric fog">夜景·浓郁电影感·体积雾</option>
            <option value="Rainy night, neon reflections on wet asphalt">雨夜·湿滑地面霓虹反射</option>
            <option value="Cyber-Daylight, high-tech clean white lighting">白昼·高精尖纯净白光</option>
            <option value="Twilight hour, golden cyan color grading">黄昏·青橙色调电影级调色</option>
        </select>
    </div>

    <div class="panel">
        <label>画幅比例 (Aspect Ratio)</label>
        <select id="ratio">
            <option value="--ar 16:9">16:9 (横屏大片)</option>
            <option value="--ar 3:2">3:2 (标准比例)</option>
            <option value="--ar 4:3">4:3 (经典比例)</option>
            <option value="--ar 9:16">9:16 (手机全屏)</option>
        </select>

        <label>AI 模型版本</label>
        <select id="version">
            <option value="--v 6.0 --style raw">Midjourney V6 (写实摄影)</option>
            <option value="--niji 6">Niji 6 (动漫/插画风)</option>
            <option value="Stable Diffusion XL">SDXL (通用增强)</option>
        </select>

        <button class="main-btn" style="margin-top: 40px;" onclick="generate()">⚡ 立即生成专家级 Prompt</button>
    </div>

    <div class="btn-group" id="result-container"></div>
</div>

<script>
const r = arr => arr[Math.floor(Math.random() * arr.length)];

const styles = [
    { zh: "硬核工业赛博", en: "Hardcore industrial cyberpunk" },
    { zh: "极简科技未来", en: "Minimalist futuristic tech" },
    { zh: "复古霓虹街区", en: "Retro-neon synthwave aesthetic" },
    { zh: "超高密度细节", en: "Hyper-detailed greeble design" },
    { zh: "故障艺术风", en: "Glitch-art tech style" }
];

const materials = [
    { zh: "拉丝阳极氧化铝板", en: "Brushed anodized aluminum panels" },
    { zh: "半透明磨砂亚克力", en: "Translucent frosted acrylic" },
    { zh: "碳纤维纹理面", en: "Carbon fiber textures" },
    { zh: "蜂窝状LED发光板", en: "Honeycomb LED light panels" },
    { zh: "防腐蚀强化玻璃", en: "Corrosion-resistant reinforced glass" }
];

const details = [
    { zh: "8K 渲染，光线追踪，虚幻引擎5风格", en: "8k render, ray tracing, Unreal Engine 5 style" },
    { zh: "超写实主义，RAW 照片质感", en: "Hyper-realistic, RAW photo quality" },
    { zh: "景深效果，电影镜头感", en: "Depth of field, cinematic lens flair" }
];

async function generate() {
    const industry = document.getElementById("industry").value.trim() || "Commercial Store";
    const scene = document.getElementById("scene").value;
    const ratio = document.getElementById("ratio").value;
    const version = document.getElementById("version").value;
    const container = document.getElementById("result-container");
    const btn = document.querySelector(".main-btn");

    btn.disabled = true;
    container.innerHTML = `<div class="loading">正在生成赛博朋克Prompt...</div>`;
    await new Promise(res => setTimeout(res, 600));

    container.innerHTML = `<h2 style="margin:20px 0; color:var(--accent)">生成结果 (共20组)</h2>`;

    for (let i = 0; i < 20; i++) {
        const s = r(styles);
        const m = r(materials);
        const d = r(details);

        const zhPrompt = `[${industry}] 门头设计，${s.zh}风格，使用${m.zh}，${scene.split(',')[0]}效果，${d.zh}。`;
        
        const enPrompt = `Professional commercial storefront design for ${industry}, ${s.en}, ${m.en}, ${scene}, ${d.en}, architectural photography, hyper-detailed, sharp focus ${version} ${ratio}`;

        const item = document.createElement("div");
        item.className = "result-item";
        item.innerHTML = `
            <div><span class="tag">方案 ${i + 1}</span></div>
            <div class="prompt-zh">${zhPrompt}</div>
            <div class="prompt-en" id="p-${i}">${enPrompt}</div>
            <button class="copy-btn" onclick="copyText('p-${i}', this)">复制英文 Prompt</button>
        `;
        container.appendChild(item);
    }

    btn.disabled = false;
}

function copyText(id, btn) {
    const text = document.getElementById(id).innerText;
    navigator.clipboard.writeText(text).then(() => {
        btn.textContent = "✅ 已复制";
        btn.style.background = "#00F5FF";
        setTimeout(() => {
            btn.textContent = "复制英文 Prompt";
            btn.style.background = "#6C00FF";
        }, 1500);
    });
}
</script>

</body>
</html>
